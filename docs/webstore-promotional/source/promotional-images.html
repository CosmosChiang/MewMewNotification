<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MewMewNotification promotional images</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;overflow:hidden;font-family:"Segoe UI",Arial,sans-serif}body{--w:440px;--h:280px;width:var(--w);height:var(--h);background:linear-gradient(135deg,#312e81 0%,#5b4bd8 52%,#8b5cf6 100%);position:relative;color:#fff}body.marquee{--w:1400px;--h:560px}.glow{position:absolute;border-radius:50%;filter:blur(2px);background:#ffffff1f}.g1{width:330px;height:330px;right:-110px;top:-170px}.g2{width:230px;height:230px;left:-120px;bottom:-150px}.grid{position:absolute;inset:0;background-image:linear-gradient(#ffffff0b 1px,transparent 1px),linear-gradient(90deg,#ffffff0b 1px,transparent 1px);background-size:34px 34px;mask-image:linear-gradient(120deg,#0008,transparent 75%)}.brand{position:absolute;display:grid;place-items:center;width:124px;height:124px;left:42px;top:78px;border-radius:31px;background:#ffffffef;box-shadow:0 22px 55px #17134b66,0 0 0 8px #ffffff18}.brand img{width:92px;height:92px}.cards{position:absolute;right:24px;top:35px;width:235px;height:210px}.card{position:absolute;width:205px;height:70px;border-radius:14px;background:#fff;box-shadow:0 18px 36px #17134b55;padding:14px;display:grid;grid-template-columns:32px 1fr;gap:10px;transform:rotate(-3deg)}.card.two{top:76px;left:22px;transform:rotate(3deg);opacity:.96}.card.three{top:144px;left:4px;transform:rotate(-1deg);opacity:.9}.bell{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#6657d9,#9b73f2);display:grid;place-items:center;color:#fff;font-size:17px}.lines{display:grid;gap:7px;align-content:center}.line{height:7px;border-radius:6px;background:#d9d5f7}.line.short{width:62%;background:#f3b24f}.marquee .brand{width:210px;height:210px;left:155px;top:175px;border-radius:50px}.marquee .brand img{width:156px;height:156px}.marquee .cards{right:145px;top:75px;width:680px;height:430px}.marquee .card{width:510px;height:130px;border-radius:24px;padding:24px;grid-template-columns:68px 1fr;gap:20px;transform:rotate(-3deg)}.marquee .card.two{top:138px;left:110px;transform:rotate(3deg)}.marquee .card.three{top:276px;left:35px}.marquee .bell{width:68px;height:68px;border-radius:18px;font-size:34px}.marquee .line{height:13px}.marquee .lines{gap:14px}.marquee .g1{width:650px;height:650px;right:-130px;top:-390px}.marquee .g2{width:480px;height:480px;left:-180px;bottom:-330px}
  </style>
</head>
<body>
  <div class="glow g1"></div><div class="glow g2"></div><div class="grid"></div>
  <div class="brand"><img src="../../../icons/icon128.png" alt=""></div>
  <div class="cards">
    <div class="card"><div class="bell">◆</div><div class="lines"><i class="line"></i><i class="line short"></i></div></div>
    <div class="card two"><div class="bell">✓</div><div class="lines"><i class="line"></i><i class="line short"></i></div></div>
    <div class="card three"><div class="bell">↗</div><div class="lines"><i class="line"></i><i class="line short"></i></div></div>
  </div>
  <script>if(new URLSearchParams(location.search).get('format')==='marquee')document.body.className='marquee';window.__PROMO_READY__=true;</script>
</body>
</html>
