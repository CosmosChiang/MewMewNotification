name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run locale:check
      - run: npm run workflow:check
      - run: npm run test:ci -- --detectOpenHandles --silent
      - run: npm run audit:high
      - run: npm run openspec:check
      - name: Upload coverage
        if: matrix.node-version == '24.x' && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: true
          token: ${{ env.CODECOV_TOKEN }}

  integration:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run test:integration -- --silent
      - run: npx playwright install --with-deps chromium
      - run: npm run package
      - run: npm run test:smoke

  package:
    runs-on: ubuntu-latest
    needs: [quality, integration]
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run version:check
      - run: npm run package
      - run: npm run package:validate
      - name: Upload package
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: extension-package
          path: |
            dist/mewmew-notification-extension.zip
            dist/mewmew-notification-extension.zip.sha256
          retention-days: 30
      - name: Attest package provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: dist/mewmew-notification-extension.zip

  release:
    runs-on: ubuntu-latest
    needs: package
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: extension-package
          path: dist
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
      - name: Verify release identity and checksum
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          npm run version:check
          sha256sum --check dist/mewmew-notification-extension.zip.sha256
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/mewmew-notification-extension.zip dist/mewmew-notification-extension.zip.sha256 --verify-tag --generate-notes
