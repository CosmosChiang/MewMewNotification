name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run dependency audit
        if: matrix.node-version == '20.x'
        run: npm run audit:high

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage to Codecov
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate workflow helper
        run: node validate-workflow.js

      - name: Run project build hook
        run: npm run build --if-present

      - name: Validate manifest
        run: |
          if [ -f "manifest.json" ]; then
            echo "Validating manifest.json..."
            node -e "
              const manifest = require('./manifest.json');
              console.log('Manifest version:', manifest.version);
              console.log('Extension name:', manifest.name);
              if (!manifest.version || !manifest.name) {
                process.exit(1);
              }
            "
          fi

      - name: Package extension
        run: |
          mkdir -p dist/package/scripts/shared
          cp manifest.json background.js options.html popup.html LICENSE dist/package/
          cp scripts/options.js scripts/popup.js dist/package/scripts/
          cp scripts/shared/config-manager.js scripts/shared/i18n.js dist/package/scripts/shared/
          cp -r icons dist/package/
          cp -r styles dist/package/
          cp -r _locales dist/package/
          (
            cd dist/package
            zip -r ../mewmew-notification-extension.zip .
          )

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: extension-package
          path: dist/mewmew-notification-extension.zip
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: extension-package
          path: ./dist

      - name: Get version from manifest
        id: get_version
        run: |
          VERSION=$(node -e "console.log(require('./manifest.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## 🚀 自動發布版本 ${{ steps.get_version.outputs.version }}

            ### 變更內容
            - 自動建構並測試通過
            - 包含所有最新功能和修復
            - 單元測試覆蓋率已驗證
            - 擴充功能封裝產物已建立

            ### 安裝方式
            1. 下載 `mewmew-notification-extension.zip`
            2. 解壓縮檔案
            3. 在 Chrome 瀏覽器中開啟擴充功能管理頁面
            4. 啟用「開發人員模式」
            5. 點擊「載入未封裝項目」並選擇解壓縮的資料夾

            ### 測試狀態
            - ✅ 單元測試: 通過
            - ✅ 封裝流程: 成功
            - ✅ GitHub Release: 已建立
          files: ./dist/mewmew-notification-extension.zip
          draft: false
          prerelease: false
